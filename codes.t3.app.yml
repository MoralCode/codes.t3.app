app-id: codes.t3.app
runtime: org.freedesktop.Sdk
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: zypak-run.sh
base: org.electronjs.Electron2.BaseApp
base-version: "24.08"
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=x11
  # GPU acceleration
  - --device=dri
  # Audio
  - --socket=pulseaudio
  - --socket=ssh-auth
  # Network access - Cursor needs this for its AI features
  - --share=network
  - --persist=.vscode-oss
  - --allow=devel
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.freedesktop.Flatpak
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --filesystem=xdg-run/gnupg:ro
  - --filesystem=xdg-config/kdeglobals:ro
  - --talk-name=com.canonical.AppMenu.Registrar
  - --system-talk-name=org.freedesktop.login1
  # Unsure
  - --talk-name=org.freedesktop.Notifications

modules:
  # - shared-modules/libcanberra/libcanberra.json
  - name: squashfs-tools
    cleanup: [ '/bin/sqsh*', '/include', '/lib', '/share' ]
    sources:
      - type: archive
        url: https://github.com/plougher/squashfs-tools/archive/refs/tags/4.6.1.tar.gz
        sha256: 9c4974e07c61547dae14af4ed1f358b7d04618ae194e54d6be72ee126f0d2f53
    buildsystem: simple
    build-commands:
      # Build the tools
      - make -C squashfs-tools
      # Manually install ONLY the binaries to avoid the /usr/local error
      - install -D squashfs-tools/unsquashfs /app/bin/unsquashfs
      - install -D squashfs-tools/mksquashfs /app/bin/mksquashfs
  - name: t3codes
    buildsystem: simple
    build-commands:
      - |
        OFFSET=$(grep -aboh "hsqs" T3Codes.AppImage | tail -n 1 | cut -d: -f1)
        echo $OFFSET
        unsquashfs -f -d squashfs-root -o $OFFSET T3Codes.AppImage
      # Copy the extracted AppImage contents into the /app directory
      - cp -r squashfs-root/usr /app/usr
      # Install metadata files
      - install -Dm644 codes.t3.app.desktop /app/share/applications/codes.t3.app.desktop
      - install -Dm644 codes.t3.app.appdata.xml /app/share/metainfo/codes.t3.app.appdata.xml
      - mkdir -p /app/share/icons/hicolor/256x256/apps
      - ffmpeg -width 256 -i squashfs-root/usr/share/icons/hicolor/1024x1024/apps/t3-code-desktop.png -vf scale=256:-1 -frames:v 1 /app/share/icons/hicolor/256x256/apps/codes.t3.app.png
      - install -Dm755 run.sh /app/bin/zypak-run.sh
      - rm -rf squashfs-root
    sources:
      - type: file
        dest-filename: T3Codes.AppImage
        url: https://github.com/pingdotgg/t3code/releases/download/v0.0.14/T3-Code-0.0.14-x86_64.AppImage
        sha256: 9a26994c5dd7310c2ce44d15948b758a84b763bd556f6705df9a65d91cf45700

      # These are the metadata files from our project directory
      - type: file
        path: codes.t3.app.desktop
      - type: file
        path: codes.t3.app.appdata.xml
      - type: file
        path: run.sh
